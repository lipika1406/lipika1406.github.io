<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTONOVA | MedNova Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <header class="text-center mb-6 border-b border-cyan-500 pb-4">
        <h1 class="text-3xl font-bold text-cyan-400 tracking-widest">AUTONOVA</h1>
        <p class="text-xs text-slate-400">Team QX-HH15 | Hospital Logistics System</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <section class="bg-slate-800 p-4 rounded-xl shadow-lg border border-slate-700">
            <h2 class="text-xl mb-4 text-cyan-300 font-semibold">Robot Control</h2>
            <button onclick="connectBT()" class="w-full bg-cyan-600 hover:bg-cyan-500 p-3 rounded-lg font-bold mb-4 transition">
                PAIR WITH ROBOT (HC-05)
            </button>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="sendData('R1')" class="bg-slate-700 p-4 rounded-lg hover:bg-slate-600 border-l-4 border-blue-500">Room 1 Req</button>
                <button onclick="sendData('R2')" class="bg-slate-700 p-4 rounded-lg hover:bg-slate-600 border-l-4 border-blue-500">Room 2 Req</button>
                <button onclick="sendData('E1')" class="bg-red-900/50 p-4 rounded-lg hover:bg-red-800 border-l-4 border-red-600 col-span-2 font-bold">EMERGENCY: ROOM 1</button>
            </div>
            <p id="status" class="mt-4 text-sm text-yellow-500 text-center">Status: Offline</p>
        </section>

        <section class="bg-slate-800 p-4 rounded-xl shadow-lg border border-slate-700">
            <h2 class="text-xl mb-4 text-emerald-400 font-semibold">Pharmacy Stock</h2>
            <div class="space-y-3">
                <div class="flex justify-between items-center bg-slate-700 p-3 rounded">
                    <span>Paracetamol</span>
                    <div class="flex items-center gap-3">
                        <button onclick="updateStock('p', -1)" class="bg-slate-600 px-2 rounded">-</button>
                        <span id="stock-p" class="font-mono text-xl">45</span>
                        <button onclick="updateStock('p', 1)" class="bg-slate-600 px-2 rounded">+</button>
                    </div>
                </div>
                <div class="flex justify-between items-center bg-slate-700 p-3 rounded">
                    <span>IV Fluids</span>
                    <div class="flex items-center gap-3">
                        <button onclick="updateStock('i', -1)" class="bg-slate-600 px-2 rounded">-</button>
                        <span id="stock-i" class="font-mono text-xl">12</span>
                        <button onclick="updateStock('i', 1)" class="bg-slate-600 px-2 rounded">+</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        let device, server, characteristic;
        const BT_SERVICE_UUID = '00001101-0000-1000-8000-00805f9b34fb'; // Standard HC-05

        async function connectBT() {
            try {
                device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [BT_SERVICE_UUID]
                });
                server = await device.gatt.connect();
                const service = await server.getPrimaryService(BT_SERVICE_UUID);
                characteristic = await service.getCharacteristic(BT_SERVICE_UUID);
                document.getElementById('status').innerText = "CONNECTED";
                document.getElementById('status').classList.replace('text-yellow-500', 'text-emerald-400');
            } catch (e) { console.error(e); }
        }

        async function sendData(code) {
            if (!characteristic) return alert("Pair Bluetooth First!");
            const data = new TextEncoder().encode(code + "\n");
            await characteristic.writeValue(data);
        }

        function updateStock(id, val) {
            let el = document.getElementById('stock-' + id);
            el.innerText = Math.max(0, parseInt(el.innerText) + val);
        }
    </script>
</body>
</html>
